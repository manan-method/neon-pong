<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEON PONG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; cursor: none; }
    #score {
      position: fixed; top: 20px; width: 100%; text-align: center;
      color: #ff8c00; font: bold 56px 'Courier New', monospace;
      pointer-events: none; letter-spacing: 18px;
      text-shadow: 0 0 12px #ff8c00, 0 0 35px #ff6600;
    }
    #message {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #ff00ff; font: bold 38px 'Courier New', monospace;
      text-align: center; pointer-events: none;
      text-shadow: 0 0 10px #ff00ff, 0 0 30px #ff00ff;
    }
    #cursor {
      position: fixed; width: 14px; height: 14px; border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px #fff, 0 0 14px #00ffff, 0 0 28px #00ffff44;
      pointer-events: none; transform: translate(-50%, -50%);
      z-index: 9999;
    }
    #hit-flash {
      position: fixed;
      font: bold 20px 'Courier New', monospace;
      pointer-events: none; text-align: center;
      transition: opacity 0.4s;
      transform: translate(-50%, -100%);
      white-space: nowrap;
    }
    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,5,0.82);
      font-family: 'Courier New', monospace;
      gap: 18px;
    }
    .overlay h1 {
      color: #ff8c00; font-size: 58px; letter-spacing: 16px;
      text-shadow: 0 0 14px #ff8c00, 0 0 40px #ff6600;
      margin-bottom: 8px;
    }
    .overlay h2 {
      color: #ff8c00; font-size: 42px; letter-spacing: 12px;
      text-shadow: 0 0 14px #ff8c00, 0 0 40px #ff6600;
      margin-bottom: 8px;
    }
    .overlay .subtitle {
      color: #555; font-size: 14px; letter-spacing: 6px; margin-bottom: 16px;
    }
    .instructions {
      margin-top: 20px; border-top: 1px solid #222;
      padding-top: 16px; display: flex; gap: 32px;
      font-size: 12px; letter-spacing: 2px; color: #444;
    }
    .instructions .col { display: flex; flex-direction: column; gap: 7px; }
    .instructions .row { display: flex; gap: 10px; align-items: center; }
    .instructions .key {
      border: 1px solid #333; color: #00ffff; padding: 2px 8px;
      font-size: 11px; white-space: nowrap; min-width: 28px; text-align: center;
    }
    .instructions .label { color: #555; }
    .menu-btn {
      background: transparent; border: 1px solid #00ffff;
      color: #00ffff; font: bold 18px 'Courier New', monospace;
      padding: 14px 48px; cursor: pointer; letter-spacing: 4px;
      text-shadow: 0 0 8px #00ffff; box-shadow: 0 0 10px #00ffff33;
      transition: all 0.15s; width: 340px; text-align: left;
      display: flex; justify-content: space-between; align-items: center;
    }
    .menu-btn:hover {
      background: #00ffff18; box-shadow: 0 0 20px #00ffff88;
      transform: scale(1.03);
    }
    .menu-btn .diff {
      font-size: 11px; letter-spacing: 2px; opacity: 0.7;
    }
    .menu-btn.hard { border-color: #ff00ff; color: #ff00ff; text-shadow: 0 0 8px #ff00ff; box-shadow: 0 0 10px #ff00ff33; }
    .menu-btn.hard:hover { background: #ff00ff18; box-shadow: 0 0 20px #ff00ff88; }
    .menu-btn.med  { border-color: #00ffff; }
    .menu-btn.easy { border-color: #00ff88; color: #00ff88; text-shadow: 0 0 8px #00ff88; box-shadow: 0 0 10px #00ff8833; }
    .menu-btn.easy:hover { background: #00ff8818; box-shadow: 0 0 20px #00ff8888; }
    .pause-btn {
      background: transparent; border: 1px solid #ff8c00;
      color: #ff8c00; font: bold 16px 'Courier New', monospace;
      padding: 12px 40px; cursor: pointer; letter-spacing: 4px;
      text-shadow: 0 0 8px #ff8c00; transition: all 0.15s; width: 260px; text-align: center;
    }
    .pause-btn:hover { background: #ff8c0018; box-shadow: 0 0 18px #ff8c0088; transform: scale(1.03); }
  </style>
</head>
<body>
  <div id="cursor"></div>
  <div id="score" style="display:none">0 — 0</div>
  <div id="message" style="display:none"></div>
  <div id="hit-flash"></div>

  <!-- Start Menu -->
  <div id="start-menu" class="overlay">
    <h1>NEON PONG</h1>
    <div class="subtitle">SELECT OPPONENT</div>
    <button class="menu-btn easy" data-speed="0.7"  data-color="0x00ff88">JOHN   <span class="diff">SUPER EASY</span></button>
    <button class="menu-btn med"  data-speed="0.25" data-color="0x00ffff">ARYAN  <span class="diff">MEDIUM</span></button>
    <button class="menu-btn hard" data-speed="0.05" data-color="0xff00ff">MANAN  <span class="diff">DIFFICULT</span></button>
    <div class="instructions">
      <div class="col">
        <div class="row"><span class="key">MOUSE</span><span class="label">MOVE PADDLE</span></div>
        <div class="row"><span class="key">LMB</span><span class="label">LUNGE / POWER SHOT</span></div>
        <div class="row"><span class="key">ESC</span><span class="label">PAUSE</span></div>
      </div>
      <div class="col">
        <div class="row"><span class="label">FIRST TO <span style="color:#ff8c00">6</span> WINS</span></div>
        <div class="row"><span class="label">DEUCE AT <span style="color:#ff8c00">5 — 5</span></span></div>
        <div class="row"><span class="label">WIN BY 2 TO CLAIM MATCH</span></div>
      </div>
    </div>
  </div>

  <!-- Game Over -->
  <div id="gameover-menu" class="overlay" style="display:none">
    <h1 id="gameover-title">YOU WIN</h1>
    <div id="gameover-score" class="subtitle" style="font-size:22px;letter-spacing:8px;color:#fff;margin-bottom:12px"></div>
    <button class="pause-btn" id="btn-playagain">PLAY AGAIN</button>
  </div>

  <!-- Pause Menu -->
  <div id="pause-menu" class="overlay" style="display:none">
    <h2>PAUSED</h2>
    <button class="pause-btn" id="btn-resume">RESUME</button>
    <button class="pause-btn" id="btn-newgame">NEW GAME</button>
  </div>

  <script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://unpkg.com/three@0.134.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script>
    // ---- Scene ----
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000008);
    scene.fog = new THREE.FogExp2(0x000008, 0.03);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 2.8, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ---- Bloom ----
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    const bloom = new THREE.UnrealBloomPass(
      new THREE.Vector2(innerWidth, innerHeight),
      1.4,   // strength
      0.6,   // radius
      0.08   // threshold — low so all bright things glow
    );
    composer.addPass(bloom);

    // ---- Lighting (minimal — neon is self-lit) ----
    scene.add(new THREE.AmbientLight(0x111133, 1.5));

    // Dynamic ball light — moves with ball
    const ballLight = new THREE.PointLight(0xffffff, 2, 5);
    scene.add(ballLight);

    // Atmosphere lights
    const cyanAtmos = new THREE.PointLight(0x00ffff, 0.8, 10);
    cyanAtmos.position.set(0, 3, 5);
    scene.add(cyanAtmos);
    const magentaAtmos = new THREE.PointLight(0xff00ff, 0.8, 10);
    magentaAtmos.position.set(0, 3, -5);
    scene.add(magentaAtmos);

    // ---- Materials ----
    const matCyan    = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const matMagenta = new THREE.MeshBasicMaterial({ color: 0xff00ff });
    const matWhite   = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const matDimCyan = new THREE.MeshBasicMaterial({ color: 0x003333 });
    const matDark    = new THREE.MeshBasicMaterial({ color: 0x020215 });

    // ---- Neon grid floor ----
    const gridA = new THREE.GridHelper(60, 60, 0x004466, 0x002233);
    gridA.position.y = -0.85;
    scene.add(gridA);

    // ======================================================
    // CYBERPUNK ENVIRONMENT
    // ======================================================
    const envSpeeders = [], envRainCols = [], envBeams = [];
    let envTime = 0;

    // InstancedMesh for windows (3 colour variants — keeps draw calls at 3)
    const _winDummy  = new THREE.Object3D();
    const _winGeo    = new THREE.BoxGeometry(0.12, 0.12, 0.04);
    let _cIdx = 0, _mIdx = 0, _oIdx = 0;
    const winCyan = new THREE.InstancedMesh(_winGeo, new THREE.MeshBasicMaterial({ color: 0x00ffff }), 250);
    const winMag  = new THREE.InstancedMesh(_winGeo, new THREE.MeshBasicMaterial({ color: 0xff00ff }), 200);
    const winOrg  = new THREE.InstancedMesh(_winGeo, new THREE.MeshBasicMaterial({ color: 0xff8800 }), 150);
    scene.add(winCyan); scene.add(winMag); scene.add(winOrg);

    const _outlineColors = [0x00ffff, 0xff00ff, 0xff6600];
    let   _outlineIdx    = 0;

    function _placeWindow(wx, wy, wz, rotY) {
      _winDummy.position.set(wx, wy, wz);
      _winDummy.rotation.y = rotY || 0;
      _winDummy.updateMatrix();
      const r = Math.random();
      if      (r < 0.45) { if (_cIdx < 250) winCyan.setMatrixAt(_cIdx++, _winDummy.matrix); }
      else if (r < 0.75) { if (_mIdx < 200) winMag .setMatrixAt(_mIdx++, _winDummy.matrix); }
      else               { if (_oIdx < 150) winOrg .setMatrixAt(_oIdx++, _winDummy.matrix); }
    }

    const _signColors = [0x00ffff, 0xff00ff, 0xff8800, 0x00ff88, 0xff4488];

    function makeBuilding(x, z, w, h, d) {
      const geo  = new THREE.BoxGeometry(w, h, d);
      const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x060614 }));
      const baseY = h / 2 - 0.85;
      mesh.position.set(x, baseY, z);
      scene.add(mesh);

      // Neon outline on ~40% of buildings
      if (Math.random() < 0.4) {
        const col  = _outlineColors[_outlineIdx++ % 3];
        const line = new THREE.LineSegments(
          new THREE.EdgesGeometry(geo),
          new THREE.LineBasicMaterial({ color: col })
        );
        line.position.copy(mesh.position);
        scene.add(line);
      }

      // Grid windows on front face — rows & columns like a real building
      const cols    = Math.max(1, Math.floor(w / 0.28));
      const rows    = Math.max(1, Math.floor(h / 0.35));
      const winZ    = z + d / 2 + 0.03;
      const xStart  = x - (cols - 1) * 0.28 / 2;
      const yStart  = (baseY - h / 2) + 0.3;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (Math.random() < 0.65) {   // 65% of grid cells lit
            _placeWindow(xStart + c * 0.28, yStart + r * 0.35, winZ);
          }
        }
      }

      // Neon sign board on front face — ~50% of buildings get one
      if (Math.random() < 0.5) {
        const signW   = Math.min(w * 0.8, 0.9 + Math.random() * 0.6);
        const signH   = 0.12 + Math.random() * 0.1;
        const signCol = _signColors[Math.floor(Math.random() * _signColors.length)];
        const sign    = new THREE.Mesh(
          new THREE.BoxGeometry(signW, signH, 0.04),
          new THREE.MeshBasicMaterial({ color: signCol })
        );
        // Place near top of building
        sign.position.set(x, baseY + h * 0.35 + signH, winZ + 0.02);
        scene.add(sign);
      }

      // Horizontal floor-band stripes (dark ledges every ~1 unit of height)
      const ledgeCount = Math.floor(h / 1.2);
      for (let li = 1; li < ledgeCount; li++) {
        const ledge = new THREE.Mesh(
          new THREE.BoxGeometry(w + 0.06, 0.04, d + 0.06),
          new THREE.MeshBasicMaterial({ color: 0x0a0a1a })
        );
        ledge.position.set(x, baseY - h / 2 + li * 1.2, z);
        scene.add(ledge);
      }
    }

    // Back wall — starts well behind the AI end, not right behind the table
    const backXGrid = [-14, -10, -7, -3, 0, 3, 7, 10, 14];
    for (let xi = 0; xi < backXGrid.length; xi++) {
      let zCur = -18;
      while (zCur > -50) {
        const bx = backXGrid[xi] + (Math.random() - 0.5) * 2.5;
        const bh = 2 + Math.random() * 8;      // smaller — looks distant
        const bw = 0.8 + Math.random() * 1.6;
        const bd = 0.8 + Math.random() * 1.6;
        if (Math.random() < 0.8) makeBuilding(bx, zCur, bw, bh, bd);
        zCur -= 5 + Math.random() * 5;
      }
    }
    // Side flanks — corridor from camera to far end, pushed out in X so they feel distant
    const flankRows = [
      { xBase: -9,  xSpread: 3 },   // left
      { xBase:  9,  xSpread: 3 },   // right
    ];
    for (const row of flankRows) {
      let zCur = 8;
      while (zCur > -46) {
        const sign = row.xBase < 0 ? -1 : 1;
        const bx   = sign * (Math.abs(row.xBase) + Math.random() * row.xSpread);
        const bh   = 1.5 + Math.random() * 5;   // small — looks far away
        const bw   = 0.7 + Math.random() * 1.2;
        const bd   = 1.2 + Math.random() * 2.5;
        makeBuilding(bx, zCur, bw, bh, bd);
        zCur -= 4 + Math.random() * 4;
      }
    }

    // Finalize instanced windows
    winCyan.instanceMatrix.needsUpdate = true; winCyan.count = _cIdx;
    winMag .instanceMatrix.needsUpdate = true; winMag .count = _mIdx;
    winOrg .instanceMatrix.needsUpdate = true; winOrg .count = _oIdx;

    // Neon signs
    ;[
      [-9,  5, -14, 0,         0x00ffff],
      [ 8,  6, -17, 0,         0xff00ff],
      [-13, 4, -22, 0,         0xff8800],
      [ 11, 7, -21, 0,         0x00ff88],
    ].forEach(([x, y, z, ry, col]) => {
      const sign = new THREE.Mesh(
        new THREE.PlaneGeometry(1.8, 0.55),
        new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide })
      );
      sign.position.set(x, y, z);
      sign.rotation.y = ry;
      scene.add(sign);
    });

    // Ground glow orbs + point lights
    ;[
      [-9, -12, 0x00ffff], [ 9, -12, 0xff00ff],
      [-14,-20, 0xff8800], [14, -20, 0x00ffff],
      [-6, -30, 0xff00ff], [ 6, -30, 0xff8800],
      [-11,-18, 0x00ff88], [11, -18, 0x00ffff],
    ].forEach(([x, z, col]) => {
      const orb = new THREE.Mesh(
        new THREE.SphereGeometry(0.1, 6, 6),
        new THREE.MeshBasicMaterial({ color: col })
      );
      orb.position.set(x, -0.75, z);
      scene.add(orb);
      const pl = new THREE.PointLight(col, 0.5, 14);
      pl.position.set(x, 1, z);
      scene.add(pl);
    });

    // Stars
    {
      const count = 120, starPos = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        starPos[i*3]   = (Math.random() - 0.5) * 60;
        starPos[i*3+1] =  5 + Math.random() * 18;
        starPos[i*3+2] = -10 - Math.random() * 45;
      }
      const sg = new THREE.BufferGeometry();
      sg.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
      scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 0.09, sizeAttenuation: true })));
    }

    // Flying speeders
    ;[
      [-12, 3.5,  5.2, 0x00ffff, -25],
      [-18, 6.0, -3.8, 0xff00ff,  25],
      [-10, 2.5,  7.1, 0xff8800, -25],
      [-25, 8.0, -4.4, 0x00ff88,  25],
      [-15, 4.5,  6.0, 0xffffff, -25],
    ].forEach(([z, y, speed, color, xStart]) => {
      const g = new THREE.Group();
      const mat = new THREE.MeshBasicMaterial({ color });
      g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.08, 0.18), mat)));
      const core = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.055, 0.10), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      g.add(core);
      [-0.32, 0.32].forEach(ox => {
        const pod = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.05, 0.08), mat);
        pod.position.x = ox; g.add(pod);
      });
      g.position.set(xStart, y, z);
      scene.add(g);
      const trailMeshes = Array.from({ length: 4 }, (_, i) => {
        const t = new THREE.Mesh(
          new THREE.SphereGeometry(0.035, 4, 4),
          new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.55 - i * 0.12 })
        );
        scene.add(t); return t;
      });
      envSpeeders.push({ g, speed, y, z, xMin: -26, xMax: 26, trailMeshes });
    });

    // Cyber rain columns
    const rainColors = [0x00ffff, 0x00ff88, 0xff00ff];
    for (let i = 0; i < 12; i++) {
      const rx = -18 + (i % 6) * 7.2 + (Math.random() - 0.5) * 2;
      const rz = (i < 6 ? -20 : -34) - Math.random() * 8;
      const col = rainColors[i % 3];
      const count = 40;
      const positions = new Float32Array(count * 3);
      const speeds    = new Float32Array(count);
      for (let j = 0; j < count; j++) {
        positions[j*3]   = rx + (Math.random() - 0.5) * 0.4;
        positions[j*3+1] = -1 + Math.random() * 22;
        positions[j*3+2] = rz;
        speeds[j] = 2 + Math.random() * 4;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: col, size: 0.09, sizeAttenuation: true, transparent: true, opacity: 0.85 }));
      scene.add(pts);
      envRainCols.push({ positions, speeds, geo, pts });
    }

    // (scan beams removed)

    function animateEnvironment(dt) {
      envTime += dt;
      // Speeders
      for (const s of envSpeeders) {
        s.g.position.x += s.speed * dt;
        if (s.speed > 0 && s.g.position.x > s.xMax) s.g.position.x = s.xMin;
        if (s.speed < 0 && s.g.position.x < s.xMin) s.g.position.x = s.xMax;
        const dir = -Math.sign(s.speed);
        s.trailMeshes.forEach((t, i) => {
          t.position.set(s.g.position.x + dir * (0.38 + i * 0.24), s.y, s.z);
        });
      }
      // Cyber rain
      for (const col of envRainCols) {
        const p = col.positions;
        for (let i = 0; i < 40; i++) {
          p[i*3+1] -= col.speeds[i] * dt;
          if (p[i*3+1] < -1.5) p[i*3+1] = 12 + Math.random() * 10;
        }
        col.geo.attributes.position.needsUpdate = true;
      }
    }
    // ---- Spiderman Easter Egg (Aryan only) ----
    let isAryan = false;
    let spiderSwingT = 0, spiderAnchorIdx = 0;

    const spiderAnchors = [
      new THREE.Vector3(-7,  5, -10),
      new THREE.Vector3( 6,  6, -12),
      new THREE.Vector3(-9,  5, -11),
      new THREE.Vector3( 8,  6, -10),
      new THREE.Vector3(-5,  5.5, -11),
    ];

    // Build figure
    const spiderGroup = new THREE.Group();
    const sRed  = new THREE.MeshBasicMaterial({ color: 0xff1111 });
    const sBlue = new THREE.MeshBasicMaterial({ color: 0x1133ff });

    const spiderHead = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), sRed);
    spiderHead.position.y = 0.24;
    spiderGroup.add(spiderHead);

    // eyes (white dots)
    [-0.04, 0.04].forEach(ex => {
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      eye.position.set(ex, 0.26, 0.08);
      spiderGroup.add(eye);
    });

    spiderGroup.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.09), sRed)));

    // legs
    [-0.05, 0.05].forEach(lx => {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.065, 0.18, 0.07), sBlue);
      leg.position.set(lx, -0.19, 0);
      spiderGroup.add(leg);
    });

    // arms
    [-0.11, 0.11].forEach((ax, i) => {
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.055, 0.15, 0.07), sRed);
      arm.position.set(ax, 0.06, 0);
      arm.rotation.z = i === 0 ? 0.5 : -0.5;
      spiderGroup.add(arm);
    });

    spiderGroup.visible = false;
    scene.add(spiderGroup);

    // Web line
    const webPositions = new Float32Array(6);
    const webGeo = new THREE.BufferGeometry();
    webGeo.setAttribute('position', new THREE.BufferAttribute(webPositions, 3));
    const webLine = new THREE.Line(webGeo, new THREE.LineBasicMaterial({ color: 0xddddff }));
    webLine.visible = false;
    scene.add(webLine);

    function animateSpider(dt) {
      spiderGroup.visible = isAryan;
      webLine.visible     = isAryan;
      if (!isAryan) return;

      spiderSwingT += dt;
      const swingPeriod = 2.2;
      const anchor  = spiderAnchors[spiderAnchorIdx];
      const webLen  = 2.2;
      const angle   = Math.sin((spiderSwingT / swingPeriod) * Math.PI) * 0.75;

      spiderGroup.position.set(
        anchor.x + Math.sin(angle) * webLen,
        anchor.y - Math.cos(angle) * webLen,
        anchor.z
      );
      spiderGroup.rotation.z = -angle;

      webPositions.set([anchor.x, anchor.y, anchor.z,
        spiderGroup.position.x, spiderGroup.position.y, spiderGroup.position.z]);
      webGeo.attributes.position.needsUpdate = true;

      // Swing to next anchor after one full arc
      if (spiderSwingT > swingPeriod * 2) {
        spiderSwingT = 0;
        spiderAnchorIdx = (spiderAnchorIdx + 1) % spiderAnchors.length;
      }
    }
    // ======================================================
    // END CYBERPUNK ENVIRONMENT
    // ======================================================

    // ---- Table ----
    const TW = 5, TL = 9, TH = 0.08;
    const table = new THREE.Mesh(new THREE.BoxGeometry(TW, TH, TL), matDark);
    table.position.y = -TH / 2;
    scene.add(table);

    // Neon table edge lines
    function neonBox(w, h, d, x, y, z, mat) {
      const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat || matCyan);
      m.position.set(x, y, z);
      scene.add(m);
      return m;
    }

    const EY = 0.006;
    neonBox(TW,   0.008, 0.03,  0,     EY,  TL / 2);   // near edge
    neonBox(TW,   0.008, 0.03,  0,     EY, -TL / 2);   // far edge
    neonBox(0.03, 0.008, TL,    TW/2,  EY,  0);         // right edge
    neonBox(0.03, 0.008, TL,   -TW/2,  EY,  0);         // left edge
    neonBox(TW,   0.005, 0.015, 0,     EY,  0, matDimCyan); // center width line
    neonBox(0.015,0.005, TL,    0,     EY,  0, matDimCyan); // center length line

    // Table corner glow posts
    [[TW/2, TL/2],[TW/2,-TL/2],[-TW/2,TL/2],[-TW/2,-TL/2]].forEach(([x,z]) => {
      neonBox(0.04, 0.12, 0.04, x, 0.06, z);
    });

    // ---- Net ----
    neonBox(TW, 0.18, 0.015, 0, 0.09, 0, matWhite);     // net bar
    neonBox(0.03, 0.22, 0.03, -TW/2, 0.11, 0, matWhite); // left post
    neonBox(0.03, 0.22, 0.03,  TW/2, 0.11, 0, matWhite); // right post

    // ---- Paddles ----
    const PW = 0.5, PH = 0.5, PD = 0.022; // collision bounds = head circle diameter
    const HEAD_R = 0.25;
    const HANDLE_W = 0.075, HANDLE_H = 0.24;

    function createPaddle(neonColor) {
      const group = new THREE.Group();

      // Head — circular disc facing along Z
      const head = new THREE.Mesh(
        new THREE.CylinderGeometry(HEAD_R, HEAD_R, PD, 48),
        new THREE.MeshBasicMaterial({ color: neonColor })
      );
      head.rotation.x = Math.PI / 2;
      group.add(head);

      // Handle — dark grip
      const handle = new THREE.Mesh(
        new THREE.BoxGeometry(HANDLE_W, HANDLE_H, PD),
        new THREE.MeshBasicMaterial({ color: 0x0d0d0d })
      );
      handle.position.y = -(HEAD_R + HANDLE_H / 2 - 0.01);
      group.add(handle);

      // Grip tape lines (neon stripes on handle for cyberpunk look)
      for (let i = 0; i < 3; i++) {
        const stripe = new THREE.Mesh(
          new THREE.BoxGeometry(HANDLE_W, 0.01, PD + 0.002),
          new THREE.MeshBasicMaterial({ color: neonColor })
        );
        stripe.position.y = -(HEAD_R + 0.06 + i * 0.08);
        group.add(stripe);
      }

      scene.add(group);
      return group;
    }

    const playerPaddle = createPaddle(0xff2200);
    const aiPaddle    = createPaddle(0xff00ff);

    function setPaddleColor(paddle, color) {
      paddle.children.forEach(child => {
        if (child.material && child.material.color.getHex() !== 0x0d0d0d) {
          child.material.color.setHex(color);
        }
      });
    }

    // ---- Ball ----
    const BALL_R = 0.065;
    const ballMesh = new THREE.Mesh(new THREE.SphereGeometry(BALL_R, 20, 20), matWhite);
    scene.add(ballMesh);

    // Ball shadow (shows XZ position on table — critical for 3D depth perception)
    const shadowMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, depthWrite: false });
    const shadowMesh = new THREE.Mesh(new THREE.CircleGeometry(0.1, 16), shadowMat);
    shadowMesh.rotation.x = -Math.PI / 2;
    shadowMesh.position.y = 0.005;
    scene.add(shadowMesh);

    // Ball trail
    const TRAIL_LEN = 6;
    const trail = Array.from({ length: TRAIL_LEN }, (_, i) => {
      const t = new THREE.Mesh(
        new THREE.SphereGeometry(BALL_R * (1 - i * 0.13), 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 - i * 0.07 })
      );
      scene.add(t);
      return t;
    });
    const trailHistory = [];

    // ---- Fire particles (speed boost effect) ----
    const fireColors = [0xffffff, 0xffee00, 0xff8800, 0xff5500, 0xff2200];
    const firePool = Array.from({ length: 60 }, (_, i) => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.038, 4, 4),
        new THREE.MeshBasicMaterial({ color: fireColors[i % fireColors.length], transparent: true })
      );
      mesh.visible = false;
      scene.add(mesh);
      return { mesh, pos: new THREE.Vector3(), vel: new THREE.Vector3(), life: 0 };
    });

    function launchFire(pos, ballVelocity) {
      const dir = ballVelocity.clone().normalize().negate();
      let spawned = 0;
      for (const p of firePool) {
        if (p.life <= 0 && spawned < 10) {
          p.pos.copy(pos);
          p.vel.set(
            dir.x * (1.5 + Math.random() * 2) + (Math.random() - 0.5) * 3,
            1.5 + Math.random() * 4,
            dir.z * (1.5 + Math.random() * 2) + (Math.random() - 0.5) * 3
          );
          p.life = 0.7 + Math.random() * 0.5;
          p.mesh.visible = true;
          spawned++;
        }
      }
    }

    // ---- Firework particles ----
    const FIREWORK_COUNT = 80;
    const fwParticles = Array.from({ length: FIREWORK_COUNT }, () => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.05, 5, 5),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      mesh.visible = false;
      scene.add(mesh);
      return { mesh, pos: new THREE.Vector3(), vel: new THREE.Vector3(), life: 0 };
    });

    function launchFireworks(cornerZ, color) {
      [-TW / 2, TW / 2].forEach(cx => {
        let spawned = 0;
        for (const p of fwParticles) {
          if (p.life <= 0 && spawned < 20) {
            p.mesh.material.color.setHex(color);
            p.pos.set(cx, 0.1, cornerZ);
            p.vel.set((Math.random() - 0.5) * 5, Math.random() * 5 + 3, (Math.random() - 0.5) * 3);
            p.life = 1;
            p.mesh.visible = true;
            p.mesh.scale.setScalar(1);
            spawned++;
          }
        }
      });
    }

    // ---- Constants ----
    const PLAYER_Z  = 4.2;
    const AI_Z      = -4.2;
    const GRAVITY   = -12;
    const NET_H     = 0.18;
    const HALF_W    = TW / 2;
    const HALF_L    = TL / 2;
    const WIN_SCORE = 6;
    const AI_SPEED = 4.2; // fixed for all difficulties
    let aiError = 0.5;    // positional aim error — higher = easier
    let aiErrorOffset = 0; // miss offset committed once per incoming ball
    let aiTargetX = 0;
    let aiWasApproaching = false;
    const HIT_MARGIN = 0.28;

    // ---- State ----
    const ballPos = new THREE.Vector3();
    const ballVel = new THREE.Vector3();
    let playerScore = 0, aiScore = 0;
    let state = 'menu';
    let pointTimer = 0;
    let lastTime = null;
    let prevPlayerX = 0;
    let playerPaddleVelX = 0;
    let lastHitter = null; // 'player' | 'ai'
    let hasBounced = false; // did ball bounce on table since last paddle hit?
    const GLOW_SPEED_MIN = 6.0;   // speed at which ball starts turning red
    const GLOW_SPEED_MAX = 12.0;  // speed at which ball is fully red
    let mouseDown = false;
    document.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
    document.addEventListener('mouseup',   e => { if (e.button === 0) mouseDown = false; });

    playerPaddle.position.set(0, 0.3, PLAYER_Z);
    aiPaddle.position.set(0, 0.3, AI_Z);

    // Serve fix: vy=5 + vz=4 gives ~y=1.24 when crossing net — safely clears NET_H=0.18
    function resetBall(playerServes) {
      ballPos.set(0, 1.2, playerServes ? PLAYER_Z - 0.5 : AI_Z + 0.5);
      ballVel.set((Math.random() - 0.5) * 1.5, 5, playerServes ? -4 : 4);
      trailHistory.length = 0;
      lastHitter = null;
      hasBounced = false;
    }

    // ---- Mouse ----
    const mouse = new THREE.Vector2();
    const raycaster = new THREE.Raycaster();
    const paddlePlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -PLAYER_Z);

    const cursorEl = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / innerHeight) * 2 + 1;
      cursorEl.style.left = e.clientX + 'px';
      cursorEl.style.top  = e.clientY + 'px';
    });

    function startGame(speed, color) {
      aiError  = speed;
      isAryan  = (speed === 0.25);
      spiderSwingT = 0; spiderAnchorIdx = 0;
      setPaddleColor(aiPaddle, color);
      playerScore  = 0;
      aiScore      = 0;
      document.getElementById('score').textContent = '0 — 0';
      document.getElementById('message').style.display = 'none';
      document.getElementById('gameover-menu').style.display = 'none';
      document.getElementById('score').style.display = 'block';
      document.getElementById('start-menu').style.display = 'none';
      document.getElementById('pause-menu').style.display = 'none';
      state = 'playing';
      resetBall(true);
    }

    document.querySelectorAll('.menu-btn').forEach(btn => {
      btn.addEventListener('click', () => startGame(parseFloat(btn.dataset.speed), parseInt(btn.dataset.color, 16)));
    });

    document.getElementById('btn-resume').addEventListener('click', () => {
      document.getElementById('pause-menu').style.display = 'none';
      state = 'playing';
    });

    document.getElementById('btn-playagain').addEventListener('click', () => {
      document.getElementById('gameover-menu').style.display = 'none';
      document.getElementById('start-menu').style.display = 'flex';
      state = 'menu';
    });

    document.getElementById('btn-newgame').addEventListener('click', () => {
      document.getElementById('score').style.display = 'none';
      document.getElementById('pause-menu').style.display = 'none';
      document.getElementById('start-menu').style.display = 'flex';
      state = 'menu';
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Escape') {
        if (state === 'playing' || state === 'point') {
          state = 'paused';
          document.getElementById('pause-menu').style.display = 'flex';
        } else if (state === 'paused') {
          document.getElementById('pause-menu').style.display = 'none';
          state = 'playing';
        }
      }
    });

    // ---- Paddle collision ----
    function checkHit(paddle, isPlayer) {
      const { x: px, y: py, z: pz } = paddle.position;
      const inX = Math.abs(ballPos.x - px) < PW / 2 + BALL_R + HIT_MARGIN;
      const inY = Math.abs(ballPos.y - py) < PH / 2 + BALL_R + HIT_MARGIN;
      const approaching = isPlayer
        ? ballPos.z > pz - 0.3 && ballPos.z < pz + 0.1 && ballVel.z > 0
        : ballPos.z < pz + 0.3 && ballPos.z > pz - 0.1 && ballVel.z < 0;

      if (inX && inY && approaching) {
        const relX = (ballPos.x - px) / (PW / 2);
        const rawSpeed = Math.hypot(ballVel.x, ballVel.y, ballVel.z);
        const speed = isPlayer
          ? (mouseDown
              ? Math.max(6.0, Math.min(rawSpeed * 1.3 + 3.0, 14))   // lunge: smash
              : Math.max(3.5, Math.min(rawSpeed * 1.08 + 1.5, 12))) // normal hit
          : Math.max(3.5, Math.min(rawSpeed * 1.08 + 1.5, 12));      // AI unchanged

        ballVel.z = isPlayer ? -speed * 0.85 : speed * 0.85;
        ballVel.x = isPlayer
          ? playerPaddleVelX * 0.3 + relX * speed * 0.15
          : relX * speed * 0.4;
        ballVel.y = isPlayer ? 3 + Math.random() * 0.5 : 4.4 + Math.random() * 0.5;
        ballPos.z = isPlayer ? pz - BALL_R - 0.02 : pz + BALL_R + 0.02;
        lastHitter = isPlayer ? 'player' : 'ai';
        hasBounced = false;
        if (isPlayer && mouseDown) launchFire(ballPos.clone(), ballVel.clone());

        if (isPlayer) {
          const el = document.getElementById('hit-flash');
          el.textContent = `HIT  ×${speed.toFixed(1)}`;
          el.style.color = '#00ffff';
          el.style.textShadow = '0 0 12px #00ffff';
          el.style.opacity = '1';
          clearTimeout(el._t);
          el._t = setTimeout(() => el.style.opacity = '0', 900);
        }
      }
    }

    // ---- AI ----
    function updateAI(dt) {
      const ballComingToAI = ballVel.z < 0;

      // Lock in a miss offset once per incoming ball
      if (ballComingToAI && !aiWasApproaching) {
        aiErrorOffset = (Math.random() - 0.5) * aiError;
      }
      aiWasApproaching = ballComingToAI;

      // Predict where ball will arrive at AI's Z, update every frame so table bounces are tracked
      if (ballComingToAI && Math.abs(ballVel.z) > 0.01) {
        const timeToAI = (AI_Z - ballPos.z) / ballVel.z;
        const predictedX = ballPos.x + ballVel.x * timeToAI;
        aiTargetX = Math.max(-HALF_W + 0.1, Math.min(HALF_W - 0.1, predictedX + aiErrorOffset));
      } else if (!ballComingToAI) {
        aiTargetX = 0; // return to center
      }

      const targetX = aiTargetX;
      const targetY = ballComingToAI ? Math.max(0.2, ballPos.y) : 0.3;
      const step = AI_SPEED * dt;
      const dx = targetX - aiPaddle.position.x;
      const dy = targetY - aiPaddle.position.y;
      aiPaddle.position.x += Math.sign(dx) * Math.min(Math.abs(dx), step);
      aiPaddle.position.y += Math.sign(dy) * Math.min(Math.abs(dy), step);
      aiPaddle.position.x = Math.max(-HALF_W + PW / 2, Math.min(HALF_W - PW / 2, aiPaddle.position.x));
      aiPaddle.position.y = Math.max(0.1, Math.min(1.4, aiPaddle.position.y));
    }

    // ---- Status message (deuce / match point) ----
    function updateStatusMessage() {
      const p = playerScore, a = aiScore;
      const msgEl = document.getElementById('message');
      let msg = '';
      if (p >= WIN_SCORE - 1 && a >= WIN_SCORE - 1) {
        if (p === a) {
          msg = 'DEUCE';
        } else {
          msg = (p > a ? 'YOUR' : 'OPPONENT') + ' MATCH POINT';
        }
      } else if (p === WIN_SCORE - 1) {
        msg = 'YOUR MATCH POINT';
      } else if (a === WIN_SCORE - 1) {
        msg = 'OPPONENT MATCH POINT';
      }
      msgEl.textContent = msg;
      msgEl.style.display = msg ? 'block' : 'none';
    }

    // ---- Score ----
    function scorePoint(playerScored) {
      if (playerScored) playerScore++; else aiScore++;
      document.getElementById('score').textContent = `${playerScore} — ${aiScore}`;
      launchFireworks(playerScored ? HALF_L : -HALF_L, playerScored ? 0x00ffff : 0xff00ff);

      // Check win: first to WIN_SCORE, must lead by 2 (deuce rule)
      const p = playerScore, a = aiScore;
      const maxScore = Math.max(p, a);
      if (maxScore >= WIN_SCORE && Math.abs(p - a) >= 2) {
        const playerWon = p > a;
        document.getElementById('gameover-title').textContent = playerWon ? 'YOU WIN!' : 'DEFEATED';
        document.getElementById('gameover-title').style.color = playerWon ? '#00ffff' : '#ff00ff';
        document.getElementById('gameover-score').textContent = `${p} — ${a}`;
        document.getElementById('gameover-menu').style.display = 'flex';
        document.getElementById('score').style.display = 'none';
        document.getElementById('message').style.display = 'none';
        state = 'gameover';
        return;
      }

      updateStatusMessage();
      state = 'point';
      pointTimer = 2;
    }

    // ---- Update ----
    function update(dt) {
      if (state !== 'playing') return;

      ballVel.y += GRAVITY * dt;
      ballPos.addScaledVector(ballVel, dt);

      // Table bounce
      if (ballPos.y < BALL_R) {
        ballPos.y = BALL_R;
        // First bounce after a hit — check it landed on the opponent's side
        if (!hasBounced && lastHitter) {
          const ownSide = (lastHitter === 'player' && ballPos.z > 0) ||
                          (lastHitter === 'ai'     && ballPos.z < 0);
          if (ownSide) { scorePoint(lastHitter === 'ai'); return; }
        }
        hasBounced = true;
        ballVel.y = -ballVel.y * 0.84;
        ballVel.x *= 0.98;
        ballVel.z *= 0.98;
      }

      // Side walls — out of bounds
      if (Math.abs(ballPos.x) > HALF_W + 0.3) {
        scorePoint(!hasBounced ? lastHitter === 'ai' : lastHitter === 'player');
        return;
      }

      // Net — hitter loses the point immediately
      if (Math.abs(ballPos.z) < 0.04 + BALL_R && ballPos.y < NET_H + BALL_R) {
        scorePoint(lastHitter === 'ai');
        return;
      }

      // Dead ball — too slow to continue, hitter loses
      if (lastHitter && Math.hypot(ballVel.x, ballVel.z) < 0.4 && ballPos.y < BALL_R + 0.05) {
        scorePoint(lastHitter === 'ai');
        return;
      }

      checkHit(playerPaddle, true);
      checkHit(aiPaddle, false);

      // Ball exits ends — hitter loses if no bounce, receiver loses if bounced
      if (ballPos.z >  HALF_L + 0.5) { scorePoint(!hasBounced ? lastHitter === 'ai' : lastHitter === 'player'); return; }
      if (ballPos.z < -HALF_L - 0.5) { scorePoint(!hasBounced ? lastHitter === 'ai' : lastHitter === 'player'); return; }

      // Ball glow: white → red based on live speed
      const _bSpeed = Math.hypot(ballVel.x, ballVel.y, ballVel.z);
      const _heat   = Math.max(0, Math.min(1, (_bSpeed - GLOW_SPEED_MIN) / (GLOW_SPEED_MAX - GLOW_SPEED_MIN)));
      ballMesh.material.color.setRGB(1, 1 - _heat, 1 - _heat);
      ballLight.color.setRGB(1, 1 - _heat * 0.8, 1 - _heat);
      ballLight.intensity = 2 + _heat * _heat * 8;  // quadratic — dim heat still brightens fast

      // Ball mesh + light + shadow
      ballMesh.position.copy(ballPos);
      ballLight.position.copy(ballPos);
      shadowMesh.position.x = ballPos.x;
      shadowMesh.position.z = ballPos.z;
      const _shadowT = Math.max(0, 1 - ballPos.y / 1.8);
      shadowMat.opacity = 0.22 * _shadowT;

      // Trail
      trailHistory.unshift(ballPos.clone());
      if (trailHistory.length > TRAIL_LEN) trailHistory.pop();
      trail.forEach((t, i) => t.position.copy(trailHistory[i] || ballPos));

      // Player paddle: mouse X/Y → paddle X/Y, with automatic Z arc
      // High paddle = slightly back (swing room), low paddle = slightly forward (reaching)
      raycaster.setFromCamera(mouse, camera);
      const hit = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(paddlePlane, hit)) {
        playerPaddle.position.x = Math.max(-HALF_W - 0.8, Math.min(HALF_W + 0.8, hit.x));
        playerPaddle.position.y = Math.max(0.05, Math.min(1.5, hit.y));
      }
      // Lunge on left click: mostly Z forward, slight Y dip
      const restZ   = PLAYER_Z + (playerPaddle.position.y - 0.4) * 0.3;
      const lungeZ  = PLAYER_Z - 0.9;
      const targetZ = mouseDown ? lungeZ : restZ;
      playerPaddle.position.z += (targetZ - playerPaddle.position.z) * Math.min(1, dt * 14);
      if (mouseDown) {
        playerPaddle.position.y = Math.max(0.05, playerPaddle.position.y - dt * 1.2);
      }
      playerPaddleVelX = (playerPaddle.position.x - prevPlayerX) / dt;
      prevPlayerX = playerPaddle.position.x;

      updateAI(dt);

      // Project player paddle to screen space — position hit-flash label near it
      const paddleScreen = playerPaddle.position.clone().project(camera);
      const hf = document.getElementById('hit-flash');
      hf.style.left = ((paddleScreen.x + 1) / 2 * innerWidth) + 'px';
      hf.style.top  = ((-paddleScreen.y + 1) / 2 * innerHeight - 20) + 'px';

      // Paddle tilt: forehand (X > 0) vs backhand (X < 0)
      const maxTilt = Math.PI / 5; // 36 degrees
      playerPaddle.rotation.z = -(playerPaddle.position.x / HALF_W) * maxTilt;
      aiPaddle.rotation.z     =  (aiPaddle.position.x    / HALF_W) * maxTilt;
    }

    // ---- Loop ----
    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min((ts - lastTime) / 1000, 0.05);
      lastTime = ts;

      if (state === 'point') {
        pointTimer -= dt;
        if (pointTimer <= 0) {
          state = 'playing';
          resetBall(aiScore > playerScore);
        }
      }

      update(dt);
      animateEnvironment(dt);
      animateSpider(dt);

      // Fire particle update
      for (const p of firePool) {
        if (p.life > 0) {
          p.life -= dt * 1.4;
          p.vel.y -= 1.5 * dt;
          p.pos.addScaledVector(p.vel, dt);
          p.mesh.position.copy(p.pos);
          const t = Math.max(0, p.life);
          p.mesh.scale.setScalar(0.3 + t * 1.5);
          p.mesh.material.opacity = Math.min(1, t * 3.0);
          if (p.life <= 0) p.mesh.visible = false;
        }
      }

      // Firework particle update (runs regardless of game state)
      for (const p of fwParticles) {
        if (p.life > 0) {
          p.life -= dt * 1.1;
          p.vel.y -= 10 * dt;
          p.pos.addScaledVector(p.vel, dt);
          p.mesh.position.copy(p.pos);
          p.mesh.scale.setScalar(Math.max(0.01, p.life));
          if (p.life <= 0) p.mesh.visible = false;
        }
      }

      composer.render();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      composer.setSize(innerWidth, innerHeight);
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
